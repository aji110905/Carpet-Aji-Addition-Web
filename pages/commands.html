<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carpet Aji Addition</title>
    <link rel="stylesheet" href="../css/common.css">
    <link rel="stylesheet" href="../css/commands.css">
    <link rel="icon" type="image/png" href="https://aji110905.github.io/Carpet-Aji-Addition-Web/assets/favicon.png">
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">Carpet Aji Addition</div>
                <nav>
                    <ul>
                        <li><a href="home.html" data-lang="common.navigation.home"></a></li>
                        <li><a href="rules.html" data-lang="common.navigation.rules"></a></li>
                        <li><a href="recipes.html" data-lang="common.navigation.recipes"></a></li>
                        <li><a href="commands.html" class="active" data-lang="common.navigation.commands"></a></li>
                        <li><a href="changelog.html" data-lang="common.navigation.changelog"></a></li>
                        <li class="language-dropdown">
                            <a href="#" class="language-icon">🌐</a>
                            <div class="dropdown-content">
                                <a href="#" class="lang-switcher" data-lang-code="en">English</a>
                                <a href="#" class="lang-switcher" data-lang-code="zh">简体中文</a>
                            </div>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    
    <main>
        <div class="container">
            <section>
                <h1 data-lang="commands.title"></h1>
                <p data-lang="commands.description"></p>
            </section>
            
            <section class="commands-container">
                <div class="command-card">
                    <h4>/follow</h4>
                    <p data-lang="commands.follow.description"></p>
                    <div class="command-usage">
                        <div class="usage-item">
                            <h5 data-lang="commands.follow.subcommands.add"></h5>
                            <code>/follow add &ltitem ID&gt</code>
                        </div>
                        <div class="usage-item">
                            <h5 data-lang="commands.follow.subcommands.remove"></h5>
                            <code>/follow remove &ltitem ID&gt</code>
                        </div>
                        <div class="usage-item">
                            <h5 data-lang="commands.follow.subcommands.list"></h5>
                            <code>/follow list</code>
                        </div>
                        <div class="usage-item">
                            <h5 data-lang="commands.follow.subcommands.color"></h5>
                            <code>/follow color set &ltcolor&gt</code>
                            <code>/follow color show</code>
                        </div>
                    </div>
                </div>
                <div class="command-card">
                    <h4>/mods</h4>
                    <p data-lang="commands.mods.description"></p>
                    <div class="command-usage">
                        <div class="usage-item">
                            <h5 data-lang="commands.mods.subcommands.list"></h5>
                            <code>/mods list</code>
                        </div>
                        <div class="usage-item">
                            <h5 data-lang="commands.mods.subcommands.info"></h5>
                            <code>/mods &ltmod name&gt</code>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <p>&copy; 2026 Carpet Aji Addition</p>
        </div>
    </footer>
    
    <script src="../js/script.js"></script>
</body>
</html>
